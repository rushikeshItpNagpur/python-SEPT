<body>
    
       <form id="prodForm" action="">
            <h1> Add Product Form </h1>
            <input type="text" name="ptitle" id="title" placeholder="Enter product Title">
            <input type="number" name="pprice" id="price" placeholder="Enter product price">
            <input type="url" name="pimage" id="image" placeholder="Enter image Link">
            <input type="text" name="pdescription" id="description" placeholder="Enter Product description" >
            <select name="pcategory" id="category">
                  <option value="">Default</option>
                  <option value="mens">Mens Product</option>
                  <option value="womens">Womens Product</option>
                  <option value="kids">Kids Product</option>
                  <option value="electronics">Electronics</option>
            </select>
            
            <input type="submit" name="" id="">


       </form>


</body>
